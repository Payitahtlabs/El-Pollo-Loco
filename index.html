<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="El Pollo Loco">
    <link rel="icon" type="image/png" href="img/favicon/pepe-favicon.png">
    <link rel="apple-touch-icon" href="img/favicon/pepe-favicon.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="style.css?v=20260422-1">
    <title>El Pollo Loco</title>
    <script src="models/drawable-object.class.js"></script>
    <script src="models/movable-object.class.js"></script>
    <script src="models/keyboard.class.js"></script>
    <script src="models/character.class.js"></script>
    <script src="models/chicken.class.js"></script>
    <script src="models/small-chicken.class.js"></script>
    <script src="models/coin.class.js"></script>
    <script src="models/salsa-bottle.class.js"></script>
    <script src="models/throwable-bottle.class.js"></script>
    <script src="models/endboss.class.js"></script>
    <script src="models/cloud.class.js"></script>
    <script src="models/background-object.class.js"></script>
    <script src="models/level.class.js"></script>
    <script src="models/counter-display.class.js"></script>
    <script src="models/status-bar.class.js"></script>
    <script src="levels/level1.js"></script>
    <script src="models/world.class.js"></script>
    <script src="js/audio-manager.js?v=20260425-1"></script>
    <script src="js/game.js?v=20260425-1"></script>
    <script src="js/toolbar-controls.js?v=20260428-1"></script>
    <script src="js/help-overlay.js?v=20260428-1"></script>
    <script src="js/game-flow.js?v=20260428-1"></script>
</head>

<body onload="init()">
    <h1>El Pollo Loco</h1>

    <div id="game-shell-frame" class="game-shell-frame">
        <div class="game-toolbar" aria-label="Game controls">
            <button id="mute-button" class="toolbar-button" type="button" aria-label="Mute audio" title="Mute audio">
                <img id="mute-icon" src="img/icons/toolbar-volume.svg" alt="" aria-hidden="true" draggable="false">
            </button>
            <button id="fullscreen-button" class="fullscreen-button" type="button" aria-label="Enter fullscreen" title="Enter fullscreen">
                <img id="fullscreen-icon" src="img/icons/toolbar-fullscreen.svg" alt="" aria-hidden="true" draggable="false">
            </button>
        </div>

        <div class="game-shell">
            <div id="start-screen" class="game-overlay" aria-hidden="false">
                <img src="img/intro_outro_screens/start/startscreen_1.png" alt="Start Game" draggable="false">
                <button id="help-button" class="help-button" type="button" aria-label="Show help and controls">?</button>
                <div class="start-screen-content">
                    <div class="start-hint">
                        <p id="start-hint-text" class="start-hint-text">Press Enter / Space to Start</p>
                    </div>
                </div>
                <div id="help-overlay" class="help-overlay hidden" aria-hidden="true">
                    <div class="help-card" role="dialog" aria-modal="true" aria-labelledby="help-title">
                        <button id="help-close-button" class="help-close-button" type="button" aria-label="Close help">×</button>
                        <h2 id="help-title" class="help-title">How to Play</h2>
                        <p class="help-objective">Collect coins and bottles, dodge the chickens, and defeat the endboss.</p>
                        <div class="start-info-panel help-info-panel" aria-label="Game controls">
                            <div class="start-control-item">
                                <div class="start-control-icons" aria-hidden="true">
                                    <span class="start-control-key">
                                        <img src="img/icons/control-left.svg" alt="" class="start-control-key-icon" draggable="false">
                                    </span>
                                    <span class="start-control-key">
                                        <img src="img/icons/control-right.svg" alt="" class="start-control-key-icon" draggable="false">
                                    </span>
                                </div>
                                <span class="start-control-label">Move</span>
                            </div>
                            <div class="start-control-item">
                                <div class="start-control-icons" aria-hidden="true">
                                    <span class="start-control-key">
                                        <img src="img/icons/control-jump.svg" alt="" class="start-control-key-icon" draggable="false">
                                    </span>
                                    <span class="start-control-or">or</span>
                                    <span class="start-control-key">Space</span>
                                </div>
                                <span class="start-control-label">Jump</span>
                            </div>
                            <div class="start-control-item">
                                <div class="start-control-icons" aria-hidden="true">
                                    <span class="start-control-key">D</span>
                                </div>
                                <span class="start-control-label">Throw</span>
                            </div>
                        </div>
                        <a class="help-imprint-link" href="impressum.html">Imprint</a>
                    </div>
                </div>
            </div>
            <canvas id="canvas" class="hidden" width="720" height="480"></canvas>
            <div id="win-screen" class="game-overlay hidden" aria-hidden="true">
                <img src="img/intro_outro_screens/win/win_4.png" alt="You won" draggable="false">
                <div class="overlay-actions">
                    <button id="win-restart-button" class="overlay-action-button overlay-action-button-primary" type="button">Restart</button>
                    <button id="win-home-button" class="overlay-action-button overlay-action-button-secondary" type="button">Home</button>
                </div>
            </div>
            <div id="game-over-screen" class="game-overlay hidden" aria-hidden="true">
                <img src="img/intro_outro_screens/game_over/you_lost_3.png" alt="Game over" draggable="false">
                <div class="overlay-actions">
                    <button id="game-over-restart-button" class="overlay-action-button overlay-action-button-primary" type="button">Restart</button>
                    <button id="game-over-home-button" class="overlay-action-button overlay-action-button-secondary" type="button">Home</button>
                </div>
            </div>
            <div id="touch-controls" class="touch-controls hidden" aria-hidden="true">
                <div class="touch-controls-group touch-controls-left">
                    <button type="button" class="touch-button" data-action="LEFT" aria-label="Move left">
                        <img src="img/icons/control-left.svg" alt="" class="touch-button-icon" aria-hidden="true" draggable="false">
                    </button>
                    <button type="button" class="touch-button" data-action="RIGHT" aria-label="Move right">
                        <img src="img/icons/control-right.svg" alt="" class="touch-button-icon" aria-hidden="true" draggable="false">
                    </button>
                </div>
                <div class="touch-controls-group touch-controls-right">
                    <button type="button" class="touch-button" data-action="SPACE" aria-label="Jump">
                        <img src="img/icons/control-jump.svg" alt="" class="touch-button-icon" aria-hidden="true" draggable="false">
                    </button>
                    <button type="button" class="touch-button touch-button-throw" data-action="D" aria-label="Throw bottle">
                        <img src="img/statusbars/3_icons/icon_salsa_bottle.png" alt="" class="touch-button-icon touch-button-bottle" aria-hidden="true" draggable="false">
                    </button>
                </div>
            </div>
        </div>

    </div>

    <div class="rotate-device-overlay" aria-hidden="true">
        <div class="rotate-device-card">
            <div class="rotate-device-icon" aria-hidden="true">
                <span class="rotate-device-icon-phone"></span>
                <span class="rotate-device-icon-arrow"></span>
            </div>
            <p class="rotate-device-title">Rotate your device</p>
            <p class="rotate-device-text">Please use landscape mode to play.</p>
        </div>
    </div>
</body>

</html>
